<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Tilfeldig Melodi Generator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 30px;
    background: #f4f4f9;
    color: #333;
  }
  button {
    margin: 10px 5px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }
  #info {
    margin-top: 20px;
  }
</style>
</head>
<body>

<h1>Tilfeldig Melodi Generator</h1>
<button id="generate">Generer Melodi</button>
<button id="play">Spill Av / Stopp</button>
<button id="print">Print Noter</button>

<div id="info"></div>

<script>
let melody = [];
let tempo = 120;
let scaleType = '';
let rootNote = 60;
let isPlaying = false;
let currentNote = 0;
let intervalId;

// Skala funksjoner
function halfToneScale() {
  return Array.from({length: 128}, (_, i) => i);
}

function wholeToneScale() {
  let start = Math.random() < 0.5 ? 0 : 1;
  return Array.from({length: 64}, (_, i) => start + i*2);
}

function octatonicScale() {
  let start = Math.floor(Math.random()*120);
  let scale = [];
  for (let i = 0; i < 20; i++) {
    scale.push(start);
    start += (i%2===0 ? 2 : 1); // annenhver hel/halv tone
  }
  return scale;
}

// Generer tilfeldig melodi
function generateMelody() {
  // Velg skala
  const scales = ['halvtoneskala', 'heltoneskala', 'oktaton'];
  scaleType = scales[Math.floor(Math.random()*scales.length)];
  let scale = [];
  if (scaleType === 'halvtoneskala') scale = halfToneScale();
  else if (scaleType === 'heltoneskala') scale = wholeToneScale();
  else if (scaleType === 'oktaton') scale = octatonicScale();

  // Velg root note C=0 ... B=11
  rootNote = Math.floor(Math.random()*12) + 60; // start nær midten
  tempo = Math.floor(Math.random()*(180-60+1)+60);

  melody = [];
  for (let i = 0; i < 20; i++) {
    const note = scale[Math.floor(Math.random()*scale.length)];
    melody.push(note);
  }

  currentNote = 0;
  updateInfo();
}

// Oppdater info på skjerm
function updateInfo() {
  document.getElementById('info').innerHTML = `
    <p><strong>Melodi:</strong> ${melody.join(', ')}</p>
    <p><strong>Tempo:</strong> ${tempo} BPM</p>
    <p><strong>Toneart:</strong> ${['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'][rootNote%12]}</p>
    <p><strong>Skala:</strong> ${scaleType}</p>
  `;
}

// Spill av melodi
function playMelody() {
  if (isPlaying) {
    clearInterval(intervalId);
    isPlaying = false;
    return;
  }

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const beatInterval = (60/tempo) * 1000;

  isPlaying = true;
  intervalId = setInterval(() => {
    if (currentNote >= melody.length) {
      currentNote = 0;
    }
    const note = melody[currentNote];
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    // Konverter MIDI til frekvens
    osc.frequency.value = 440 * Math.pow(2, (note-69)/12);
    osc.type = 'sine';
    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.3); // spill note i 0.3 sek

    currentNote++;
  }, beatInterval);
}

// Event listeners
document.getElementById('generate').addEventListener('click', generateMelody);
document.getElementById('play').addEventListener('click', playMelody);
document.getElementById('print').addEventListener('click', () => {
  console.log('Melodi:', melody);
  alert('Melodi: ' + melody.join(', '));
});
</script>

</body>
</html>
