<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>5-stemmet Tilfeldig Melodi Generator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 30px;
    background: #f4f4f9;
    color: #333;
  }
  button {
    margin: 10px 5px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }
  #info {
    margin-top: 20px;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<h1>5-stemmet Tilfeldig Melodi Generator</h1>
<button id="generate">Generer Melodi</button>
<button id="play">Spill Av / Stopp</button>
<button id="print">Print Noter</button>

<div id="info"></div>

<script>
let melody = []; // 5x20 matrise
let tempo = 120;
let scaleType = '';
let rootNote = 60;
let isPlaying = false;
let currentNote = 0;
let intervalId;

// Skala funksjoner
function halfToneScale() {
  return Array.from({length: 128}, (_, i) => i);
}

function wholeToneScale() {
  let start = Math.random() < 0.5 ? 0 : 1;
  return Array.from({length: 64}, (_, i) => start + i*2);
}

function octatonicScale() {
  let scale = [];
  let note = Math.floor(Math.random() * 64); // startnote 0-63
  for (let i = 0; i < 128; i++) {
    scale.push(note);
    note += (i % 2 === 0 ? 2 : 1);
    if (note > 127) break;
  }
  return scale;
}

// Generer 5-stemmet melodi
function generateMelody() {
  const scales = ['halvtoneskala', 'heltoneskala', 'oktaton'];
  scaleType = scales[Math.floor(Math.random()*scales.length)];
  let scale = [];
  if (scaleType === 'halvtoneskala') scale = halfToneScale();
  else if (scaleType === 'heltoneskala') scale = wholeToneScale();
  else if (scaleType === 'oktaton') scale = octatonicScale();

  rootNote = Math.floor(Math.random()*12) + 60; 
  tempo = Math.floor(Math.random()*(180-60+1)+60);

  melody = [];
  for (let v = 0; v < 5; v++) {
    let voice = [];
    for (let i = 0; i < 20; i++) {
      let note = scale[Math.floor(Math.random()*scale.length)];
      if (note < 60 || note > 96) note = 0;
      voice.push(note);
    }
    melody.push(voice);
  }

  currentNote = 0;
  updateInfo();
}

// Oppdater info
function updateInfo() {
  let infoText = `Tempo: ${tempo} BPM\nToneart: ${['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'][rootNote%12]}\nSkala: ${scaleType}\n\n`;
  melody.forEach((voice, i) => {
    infoText += `Stemme ${i+1}: ${voice.join(', ')}\n`;
  });
  document.getElementById('info').innerText = infoText;
}

// Spill av melodi
function playMelody() {
  if (isPlaying) {
    clearInterval(intervalId);
    isPlaying = false;
    return;
  }

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const beatInterval = (60/tempo) * 1000;

  isPlaying = true;
  currentNote = 0;

  intervalId = setInterval(() => {
    if (currentNote >= 20) {
      currentNote = 0;
    }

    // Spill alle stemmer samtidig
    melody.forEach(voice => {
      const note = voice[currentNote];
      if (note === 0) return; // stille hvis 0

      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      osc.frequency.value = 440 * Math.pow(2, (note-69)/12);
      osc.type = 'sine';
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    });

    currentNote++;
  }, beatInterval);
}

// Event listeners
document.getElementById('generate').addEventListener('click', generateMelody);
document.getElementById('play').addEventListener('click', playMelody);
document.getElementById('print').addEventListener('click', () => {
  console.log('Melodi (5 stemmer):', melody);
  alert('Melodi (5 stemmer) se konsoll for full utskrift');
});
</script>

</body>
</html>
