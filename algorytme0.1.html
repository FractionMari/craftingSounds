<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>5-stemmet Melodi Generator (16 steg)</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 30px;
    background: #f4f4f9;
  }

  button {
    margin: 10px 5px;
    padding: 10px 20px;
    font-size: 16px;
  }

  table {
    border-collapse: collapse;
    margin-top: 20px;
  }

  td {
    border: 1px solid #999;
    padding: 6px;
    width: 38px;
    text-align: center;
  }

  td.zero {
    background: #ddd;
    color: #999;
  }
</style>
</head>
<body>

<h2>5-stemmet tilfeldig melodi (16-stegs sekvens)</h2>

<button id="generate">Generer</button>
<button id="play">Spill / Stopp</button>
<button id="print">Print</button>

<div id="info"></div>

<script>

let melody = [];
let tempo = 120;
let scaleType = "";
let rootNote = 60;

let isPlaying = false;
let currentStep = 0;
let intervalId;

const STEPS = 16;
const VOICES = 5;

function halfToneScale(){
  return Array.from({length:128},(_,i)=>i);
}

function wholeToneScale(){
  let start = Math.random()<0.5 ? 0 : 1;
  return Array.from({length:64},(_,i)=>start+i*2);
}

function octatonicScale(){
  let scale=[];
  let note=Math.floor(Math.random()*64);

  for(let i=0;i<128;i++){
    scale.push(note);
    note += (i%2===0?2:1);
    if(note>127) break;
  }

  return scale;
}

function generateMelody(){

  const scales=['halvtoneskala','heltoneskala','oktaton'];
  scaleType=scales[Math.floor(Math.random()*scales.length)];

  let scale;

  if(scaleType==='halvtoneskala') scale=halfToneScale();
  if(scaleType==='heltoneskala') scale=wholeToneScale();
  if(scaleType==='oktaton') scale=octatonicScale();

  tempo=Math.floor(Math.random()*121)+60;
  rootNote=Math.floor(Math.random()*12);

  melody=[];

  for(let v=0;v<VOICES;v++){

    let voice=[];

    for(let s=0;s<STEPS;s++){

      let note=scale[Math.floor(Math.random()*scale.length)];

      if(note<60 || note>96) note=0;

      voice.push(note);
    }

    melody.push(voice);
  }

  currentStep=0;

  drawGrid();
}

function drawGrid(){

  let html=`Tempo: ${tempo} BPM<br>
  Toneart: ${['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'][rootNote]}<br>
  Skala: ${scaleType}<br><br>`;

  html+="<table>";

  melody.forEach(voice=>{
    html+="<tr>";
    voice.forEach(n=>{
      html+=`<td class="${n===0?'zero':''}">${n}</td>`;
    });
    html+="</tr>";
  });

  html+="</table>";

  document.getElementById("info").innerHTML=html;
}

function playMelody(){

  if(isPlaying){
    clearInterval(intervalId);
    isPlaying=false;
    return;
  }

  const audioCtx=new (window.AudioContext||window.webkitAudioContext)();

  const beat=(60/tempo)*1000;

  isPlaying=true;
  currentStep=0;

  intervalId=setInterval(()=>{

    if(currentStep>=STEPS) currentStep=0;

    melody.forEach(voice=>{

      let note=voice[currentStep];

      if(note===0) return;

      const osc=audioCtx.createOscillator();
      const gain=audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.frequency.value=440*Math.pow(2,(note-69)/12);
      osc.type="sine";

      gain.gain.setValueAtTime(0.2,audioCtx.currentTime);

      osc.start();
      osc.stop(audioCtx.currentTime+0.25);

    });

    currentStep++;

  },beat);
}

document.getElementById("generate").onclick=generateMelody;
document.getElementById("play").onclick=playMelody;
document.getElementById("print").onclick=()=>console.log(melody);

</script>

</body>
</html>
