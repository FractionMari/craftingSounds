let melody=[]

let scaleType=''
let rootNote=60

let isPlaying=false
let currentStep=0
let intervalId

const STEPS=32
const VOICES=5
function halfToneScale() {
  return Array.from({length:128}, (_, i) => i);
}

function wholeToneScale() {
  let start = Math.random() < 0.5 ? 0 : 1;
  return Array.from({length:64}, (_, i) => start + i*2);
}

function octatonicScale() {
  let scale = [];
  let note = Math.floor(Math.random()*64);
  for(let i=0;i<64;i++){
    scale.push(note);
    note += (i % 2 === 0 ? 1 : 2);
    if(note>127) note=127;
  }
  return scale;
}

function diatonicScale() {
  let scale = [];
  let intervals = [0,2,4,5,7,9,11]; // C-D-E-F-G-A-B
  for(let octave=0; octave<11; octave++){
    intervals.forEach(iv => {
      let n = iv + octave*12;
      if(n<=127) scale.push(n);
    });
  }
  return scale;
}

function drawGrid() {
  let html = `Toneart: ${['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'][rootNote]}<br>
Skala: ${scaleType}<br><br>
<table border="1" cellspacing="0" cellpadding="5"><tr>`;

  // Lag BPM-rad
  html += `<td><b>BPM</b></td>`;
  for (let s = 0; s < STEPS; s++) {
    html += `<td id="bpm_${s}">${tempo}</td>`;
  }
  html += `</tr>`;

  // Lag tone-rader for stemmene
  for (let v = 0; v < VOICES; v++) {
    html += `<tr><td><b>Stemme ${v+1}</b></td>`;
    for (let s = 0; s < STEPS; s++) {
      html += `<td id="c${v}_${s}">${melody[v][s]}</td>`;
    }
    html += `</tr>`;
  }

  html += `</table>`;
  document.getElementById("grid").innerHTML = html;
}  


function generateMelody() {
  melody = [];

  // Velg skala tilfeldig
  let scaleOptions = [halfToneScale, wholeToneScale, octatonicScale, diatonicScale];
  let chosenScaleFunc = scaleOptions[Math.floor(Math.random() * scaleOptions.length)];
  let scaleNotesArr = chosenScaleFunc();

  // Definer range per stemme
  const voiceRanges = [
    {min: 60, max: 96},  // Stemme 1
    {min: 50, max: 103}, // Stemme 2
    {min: 55, max: 108}, // Stemme 3
    {min: 48, max: 92},  // Stemme 4
    {min: 36, max: 88}   // Stemme 5
  ];

  // Generer noter
  for (let v = 0; v < VOICES; v++) {
    melody[v] = [];
    for (let s = 0; s < STEPS; s++) {
      let note = scaleNotesArr[Math.floor(Math.random() * scaleNotesArr.length)];

      // Filter for stemme-range
      if (note < voiceRanges[v].min || note > voiceRanges[v].max) note = 0;

      melody[v][s] = note;
    }
  }

  // ABA-regel med dobbel varighet
  applyABARule();

  // Tegn rutenett
  drawGrid();
}

  function playMelody() {
  if (isPlaying) {
    isPlaying = false;
    return;
  }

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  isPlaying = true;
  currentStep = 0;
  let slowFlag = false;       // flagg for tempo-senking
  let startTempo = tempo;     // husk starttempo

  function playStep() {
    if (!isPlaying) return;

    // ---------------- AVSPILLING -----------------
    melody.forEach((voice, v) => {
      let note = voice[currentStep];
      let cell = document.getElementById(`c${v}_${currentStep}`);
      if (cell) cell.classList.add("active");
      setTimeout(() => { if (cell) cell.classList.remove("active"); }, 200);

      if (note === 0) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.frequency.value = 440 * Math.pow(2, (note - 69) / 12);
      osc.type = "sine";
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    });

    // ---------------- DYNAMISK TEMPO -----------------
    let nonZeroVoices = melody.filter(voice => voice[currentStep] !== 0).length;

    if (nonZeroVoices === 0) {
      // Alle 0 → reduser tempo på neste steg
      slowFlag = true;
      for (let v = 0; v < VOICES; v++) {
        let cell = document.getElementById(`c${v}_${currentStep}`);
        if (cell) cell.classList.add("tempo-slow");
      }
    } else if (nonZeroVoices === 3 || nonZeroVoices === 4) {
      // Tre eller fire stemmer → gjenopprett starttempo
      tempo = startTempo;
      slowFlag = false; // nullstill flagg
      console.log("Tempo gjenopprettet til start:", tempo, "BPM");
    } else if (slowFlag) {
      // Reduser tempo etter alle 0
      tempo = Math.max(10, tempo - 10);
      slowFlag = false;
      console.log("Tempo redusert til", tempo, "BPM");
    }

    // Oppdater BPM i info-div
    let tempoSpan = document.getElementById("tempoVal");
    if (tempoSpan) tempoSpan.innerText = tempo;

    // Oppdater BPM i BPM-rad
    let bpmCell = document.getElementById(`bpm_${currentStep}`);
    if (bpmCell) bpmCell.innerText = tempo;

    // Beregn delay for neste steg basert på oppdatert tempo
    let beat = (60 / tempo) * 1000;

    // Gå til neste steg
    currentStep++;
    if (currentStep >= STEPS) currentStep = 0;

    setTimeout(playStep, beat);
  }

  playStep();
}

document.getElementById("generate").onclick=generateMelody
document.getElementById("play").onclick=playMelody
document.getElementById("print").onclick=()=>console.log(melody)


function applyABARule(){ // gammel

  melody.forEach(voice => {

    for(let i = 2; i < STEPS; i++){

      let a = voice[i-2]
      let b = voice[i-1]
      let c = voice[i]

      // sjekk a-b-a og at ingen er 0
      if(a === c && a !== b && a !== 0){
    //  if(a === c && a !== b && a !== 0 && b !== 0){ // gammel

        let pattern = [a,a,b,b,a,a]

        for(let j = 0; j < pattern.length; j++){

          let pos = i + 1 + j

          if(pos < STEPS){
            voice[pos] = pattern[j]
          }

        }

      }

    }

  })

}

function applyUnisonRule(){

for(let s=0; s<STEPS-2; s++){

for(let v1=0; v1<VOICES; v1++){

for(let v2=v1+1; v2<VOICES; v2++){

let a = melody[v1][s]
let b = melody[v2][s]

if(a !== 0 && a === b){

// første stemme
melody[v1][s+1] = a + 7
melody[v1][s+2] = a + 12

// andre stemme
melody[v2][s+1] = a - 5
melody[v2][s+2] = a - 12

}

}

}

}
  
}
  
function applyAllVoicesRule(){

for(let s=0; s<STEPS-5; s++){

let allPlaying = true

for(let v=0; v<VOICES; v++){
if(melody[v][s] === 0){
allPlaying = false
break
}
}

if(allPlaying){

for(let v=0; v<VOICES; v++){

let start = melody[v][s]

let direction = Math.random() < 0.5 ? -1 : 1

let stepSize = 1

if(scaleType === "heltoneskala") stepSize = 2
if(scaleType === "oktaton") stepSize = (Math.random()<0.5?1:2)
if(scaleType === "diatonisk") {
    // intervaller i C-dur: [2,2,1,2,2,2,1]
    let intervals = [2,2,1,2,2,2,1];
    // velg tilfeldig intervall hver gang
    stepSize = intervals[Math.floor(Math.random()*intervals.length)];
}

for(let i=1;i<=5;i++){

let newNote = start + direction * stepSize * i

if(newNote >= 60 && newNote <= 96){
melody[v][s+i] = newNote
}else{
melody[v][s+i] = 0
}

}

}

}

}
